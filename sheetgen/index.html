<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Geometry Dash Collab Creator</title>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="static/style.css" />
</head>
<body>
    <h1>Генератор таблиц для коллабов</h1>
    <p>Оригинальная идея была создана Crash Team</p>
    
    <div class="container">
        <h2>Основная информация</h2>
        <label for="collabName">Название коллаба:</label>
        <input type="text" id="collabName" placeholder="Введите название коллаба" />
    </div>
    
    <div class="container">
        <h2>Парты</h2>
        <div id="partsContainer"></div>
        <button id="addPart">+ Добавить парт</button>
        <button id="autoAssignBtn">Авто распределить цвета и группы</button>
    </div>
    
    <div class="container">
        <h2>Настройки таблицы</h2>
        <label for="gpColumn">Название колонки для гпшеров:</label>
        <input type="text" id="gpColumn" placeholder="Геймплей" value="Геймплей" />
        
        <label for="decorColumn">Название колонки для декорщиков:</label>
        <input type="text" id="decorColumn" placeholder="Декор" value="Декор" />
        
        <div class="button-group">
            <button id="previewBtn">Предпросмотр</button>
            <button id="exportBtn">Экспорт в Excel</button>
        </div>
    </div>

    <div class="container">
        <div class="preset-controls" style="margin-top: 10px;">
            <button id="savePresetBtn">Сохранить пресет</button>
            <button id="deletePresetBtn">Удалить пресет</button>
            <select id="presetSelect">
                <option value="">Загрузить пресет...</option>
            </select>
        </div>
    </div>
    
    <div id="previewContainer" class="container hidden">
        <h2>Предпросмотр таблицы</h2>
        <div id="previewTable"></div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const partsContainer = document.getElementById('partsContainer');
    const addPartBtn = document.getElementById('addPart');
    const previewBtn = document.getElementById('previewBtn');
    const exportBtn = document.getElementById('exportBtn');
    const previewContainer = document.getElementById('previewContainer');
    const previewTable = document.getElementById('previewTable');
    const presetSelect = document.getElementById('presetSelect');
    const savePresetBtn = document.getElementById('savePresetBtn');
    const deletePresetBtn = document.getElementById('deletePresetBtn');
    const autoAssignBtn = document.getElementById('autoAssignBtn');

    let partCount = 0;

    function createPart(partNumber) {
        const partDiv = document.createElement('div');
        partDiv.className = 'part-row';
        partDiv.innerHTML = `
            <h3 style="margin-top: 0; color: #3498db;">Парт ${partNumber}</h3>
            <label>Оффсет:</label>
            <div class="time-inputs">
                <input type="number" id="partStart${partNumber}" step="0.1" min="0" placeholder="Начало" />
                <span>—</span>
                <input type="number" id="partEnd${partNumber}" step="0.1" min="0" placeholder="Конец" />
            </div>
            <label for="gpAuthor${partNumber}">ГПшер:</label>
            <input type="text" id="gpAuthor${partNumber}" placeholder="Введите имя гпшера" />
            <label for="decorAuthor${partNumber}">Декорщик:</label>
            <input type="text" id="decorAuthor${partNumber}" placeholder="Введите имя декорщика" />
            <label for="groupsRange${partNumber}">Диапазон групп:</label>
            <input type="text" id="groupsRange${partNumber}" placeholder="Например: 1-100" />
            <label for="colorsRange${partNumber}">Диапазон цветов:</label>
            <input type="text" id="colorsRange${partNumber}" placeholder="Например: 1-20" />
            <button class="removePart" data-part="${partNumber}">Удалить парт</button>
        `;
        partDiv.querySelector('.removePart').addEventListener('click', () => {
            partsContainer.removeChild(partDiv);
            updatePartsIndices();
        });
        return partDiv;
    }

    function updatePartsIndices() {
        const parts = partsContainer.querySelectorAll('.part-row');
        parts.forEach((part, index) => {
            const partNumber = index + 1;
            part.querySelector('h3').textContent = `Парт ${partNumber}`;
            const removeBtn = part.querySelector('.removePart');
            removeBtn.setAttribute('data-part', partNumber);

            part.querySelector('input[placeholder="Начало"]').id = `partStart${partNumber}`;
            part.querySelector('input[placeholder="Конец"]').id = `partEnd${partNumber}`;
            part.querySelector('input[placeholder="Введите имя гпшера"]').id = `gpAuthor${partNumber}`;
            part.querySelector('input[placeholder="Введите имя декорщика"]').id = `decorAuthor${partNumber}`;
            part.querySelector('input[placeholder="Например: 1-100"]').id = `groupsRange${partNumber}`;
            part.querySelector('input[placeholder="Например: 1-20"]').id = `colorsRange${partNumber}`;
        });
        partCount = parts.length;
    }

    addPartBtn.addEventListener('click', () => {
        partCount++;
        partsContainer.appendChild(createPart(partCount));
    });

    function collectPartsData() {
        const parts = partsContainer.querySelectorAll('.part-row');
        let partsData = [];
        parts.forEach((part, index) => {
            const startInput = part.querySelector('input[placeholder="Начало"]');
            const endInput = part.querySelector('input[placeholder="Конец"]');
            const gpInput = part.querySelector('input[placeholder="Введите имя гпшера"]');
            const decorInput = part.querySelector('input[placeholder="Введите имя декорщика"]');
            const groupsInput = part.querySelector('input[placeholder="Например: 1-100"]');
            const colorsInput = part.querySelector('input[placeholder="Например: 1-20"]');

            if (!startInput || !endInput || !gpInput || !decorInput || !groupsInput || !colorsInput) {
                throw new Error('Некорректная структура партa');
            }

            const start = startInput.value.trim();
            const end = endInput.value.trim();
            const gp = gpInput.value.trim();
            const decor = decorInput.value.trim();
            const groups = groupsInput.value.trim();
            const colors = colorsInput.value.trim();

            if (start === '' || end === '') {
                alert(`Пожалуйста, заполните поля "Начало" и "Конец" для партa ${index + 1}`);
                throw new Error('Заполните все поля времени');
            }
            if (isNaN(parseFloat(start)) || isNaN(parseFloat(end))) {
                alert(`Начало и Конец должны быть числами в партe ${index + 1}`);
                throw new Error('Неверный формат времени');
            }
            if (parseFloat(start) > parseFloat(end)) {
                alert(`Начало не может быть больше Конца в партe ${index + 1}`);
                throw new Error('Неверный диапазон времени');
            }

            partsData.push({
                start: parseFloat(start),
                end: parseFloat(end),
                gp,
                decor,
                groups,
                colors,
            });
        });
        return partsData;
    }

    function savePreset(name, data) {
        const presets = JSON.parse(localStorage.getItem('presets') || '{}');
        presets[name] = data;
        localStorage.setItem('presets', JSON.stringify(presets));
        loadPresets();
    }

    function loadPresets() {
        const presets = JSON.parse(localStorage.getItem('presets') || '{}');
        presetSelect.innerHTML = `<option value="">Загрузить пресет...</option>`;
        Object.keys(presets).forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            presetSelect.appendChild(option);
        });
    }

    function applyPreset(data) {
        document.getElementById('collabName').value = data.collabName || '';
        document.getElementById('gpColumn').value = data.gpColumn || 'Геймплей';
        document.getElementById('decorColumn').value = data.decorColumn || 'Декор';

        partsContainer.innerHTML = '';
        partCount = 0;

        data.parts.forEach(part => {
            partCount++;
            const partDiv = createPart(partCount);
            partsContainer.appendChild(partDiv);
            partDiv.querySelector('input[placeholder="Начало"]').value = part.start;
            partDiv.querySelector('input[placeholder="Конец"]').value = part.end;
            partDiv.querySelector('input[placeholder="Введите имя гпшера"]').value = part.gp;
            partDiv.querySelector('input[placeholder="Введите имя декорщика"]').value = part.decor;
            partDiv.querySelector('input[placeholder="Например: 1-100"]').value = part.groups;
            partDiv.querySelector('input[placeholder="Например: 1-20"]').value = part.colors;
        });
    }

    function createPreviewTable(collabName, parts, gpColumnName, decorColumnName) {
        const table = document.createElement('table');
        const caption = document.createElement('caption');
        caption.textContent = collabName;
        caption.style.fontWeight = '600';
        caption.style.fontSize = '18px';
        caption.style.marginBottom = '10px';
        table.appendChild(caption);

        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        const headers = ['Парт', 'Оффсет', gpColumnName, decorColumnName, 'Диапазон групп', 'Диапазон цветов'];
        headers.forEach(text => {
            const th = document.createElement('th');
            th.textContent = text;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        parts.forEach((part, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${index + 1}</td>
                <td>${part.start} — ${part.end}</td>
                <td>${part.gp}</td>
                <td>${part.decor}</td>
                <td>${part.groups}</td>
                <td>${part.colors}</td>
            `;
            tbody.appendChild(row);
        });
        table.appendChild(tbody);

        return table;
    }

    previewBtn.addEventListener('click', () => {
        try {
            const collabName = document.getElementById('collabName').value.trim();
            const gpColumnName = document.getElementById('gpColumn').value.trim() || 'Геймплей';
            const decorColumnName = document.getElementById('decorColumn').value.trim() || 'Декор';

            if (!collabName) {
                alert('Пожалуйста, введите название коллаба');
                return;
            }

            const parts = collectPartsData();

            previewTable.innerHTML = '';
            previewTable.appendChild(createPreviewTable(collabName, parts, gpColumnName, decorColumnName));
            previewContainer.classList.remove('hidden');
        } catch (error) {
            console.error(error);
        }
    });

    function createExcel(collabName, parts, gpColumnName, decorColumnName) {
        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('Таблица');

        sheet.addRow([collabName]);
        sheet.mergeCells('A1:F1');
        const titleCell = sheet.getCell('A1');
        titleCell.font = { size: 14, bold: true };
        titleCell.alignment = { vertical: 'middle', horizontal: 'center' };

        const headerRow = sheet.addRow([
            'Парт',
            'Оффсет',
            gpColumnName,
            decorColumnName,
            'Группы',
            'Цвета'
        ]);
        headerRow.font = { bold: true };
        headerRow.alignment = { horizontal: 'center' };

        headerRow.eachCell(cell => {
            cell.fill = {
                type: 'pattern',
                pattern: 'solid',
                fgColor: { argb: 'FFFFCC00' }
            };
        });

        parts.forEach((part, index) => {
            const row = sheet.addRow([
                index + 1,
                `${part.start} — ${part.end}`,
                part.gp,
                part.decor,
                part.groups,
                part.colors
            ]);

            row.alignment = { vertical: 'middle', horizontal: 'center' };

            // 🔹 Чередующийся серый цвет
            const bgColor = index % 2 === 0 ? 'FFF2F2F2' : 'FFE6E6E6';
            row.eachCell(cell => {
                cell.fill = {
                    type: 'pattern',
                    pattern: 'solid',
                    fgColor: { argb: bgColor }
                };
            });
        });

        sheet.eachRow({ includeEmpty: false }, row => {
            row.eachCell({ includeEmpty: false }, cell => {
                cell.border = {
                    top:    { style: 'thin' },
                    left:   { style: 'thin' },
                    bottom: { style: 'thin' },
                    right:  { style: 'thin' }
                };
            });
        });

        const widths = [6, 15, 25, 25, 15, 15];
        widths.forEach((w, i) => {
            sheet.getColumn(i + 1).width = w;
        });

        return workbook.xlsx.writeBuffer();
    }


    exportBtn.addEventListener('click', async () => {
        try {
            const collabName = document.getElementById('collabName').value.trim();
            const gpColumnName = document.getElementById('gpColumn').value.trim() || 'Геймплей';
            const decorColumnName = document.getElementById('decorColumn').value.trim() || 'Декор';

            if (!collabName) {
                alert('Пожалуйста, введите название коллаба');
                return;
            }

            const parts = collectPartsData();

            const buffer = await createExcel(collabName, parts, gpColumnName, decorColumnName);
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            saveAs(blob, `${collabName}_table.xlsx`);
        } catch (error) {
            console.error(error);
        }
    });

    presetSelect.addEventListener('change', () => {
        const selected = presetSelect.value;
        if (!selected) return;
        const presets = JSON.parse(localStorage.getItem('presets') || '{}');
        if (presets[selected]) {
            applyPreset(presets[selected]);
        }
    });

    savePresetBtn.addEventListener('click', () => {
        const name = prompt('Введите имя пресета для сохранения');
        if (!name) return;

        try {
            const collabName = document.getElementById('collabName').value.trim();
            const gpColumnName = document.getElementById('gpColumn').value.trim() || 'Геймплей';
            const decorColumnName = document.getElementById('decorColumn').value.trim() || 'Декор';
            const parts = collectPartsData();

            savePreset(name, {
                collabName,
                gpColumn: gpColumnName,
                decorColumn: decorColumnName,
                parts
            });
            alert('Пресет сохранён!');
        } catch (error) {
            console.error(error);
        }
    });

    deletePresetBtn.addEventListener('click', () => {
        const name = presetSelect.value;
        if (!name) {
            alert('Выберите пресет для удаления');
            return;
        }
        if (!confirm(`Удалить пресет "${name}"?`)) return;
        const presets = JSON.parse(localStorage.getItem('presets') || '{}');
        delete presets[name];
        localStorage.setItem('presets', JSON.stringify(presets));
        loadPresets();
        presetSelect.value = '';
        alert('Пресет удалён!');
    });

    function parseRange(str) {
        const parts = str.split('-').map(s => parseInt(s.trim()));
        if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1]) && parts[0] <= parts[1]) {
            return { start: parts[0], end: parts[1] };
        }
        return null;
    }

    function formatRange(range) {
        return `${range.start}-${range.end}`;
    }

    function autoAssignGroupsAndColors() {
        const parts = partsContainer.querySelectorAll('.part-row');
        let groupStart = 1;
        let colorStart = 1;

        parts.forEach(part => {
            const groupsInput = part.querySelector('input[placeholder="Например: 1-100"]');
            const colorsInput = part.querySelector('input[placeholder="Например: 1-20"]');

            let groupsRange = parseRange(groupsInput.value) || { start: 1, end: 50 };
            let colorsRange = parseRange(colorsInput.value) || { start: 1, end: 75 };

            const groupsLength = groupsRange.end - groupsRange.start + 1;
            const colorsLength = colorsRange.end - colorsRange.start + 1;

            groupsInput.value = formatRange({ start: groupStart, end: groupStart + groupsLength - 1 });
            colorsInput.value = formatRange({ start: colorStart, end: colorStart + colorsLength - 1 });

            groupStart += groupsLength;
            colorStart += colorsLength;
        });
    }

    autoAssignBtn.addEventListener('click', () => {
        autoAssignGroupsAndColors();
    });

    loadPresets();
});
</script>
</body>
</html>
